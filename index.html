<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#9c88ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Qwixx</title>
  <link rel="manifest" href="/qwixx/manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.svg">
  <link rel="icon" href="assets/icons/icon-192.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <!-- Setup Screen -->
    <div id="setup-screen" class="screen">
      <h1>Qwixx</h1>
      <div class="setup-form">
        <div class="input-group">
          <label for="player1-name">Player 1</label>
          <input type="text" id="player1-name" placeholder="Enter name" maxlength="12">
        </div>
        <div class="input-group">
          <label for="player2-name">Player 2</label>
          <input type="text" id="player2-name" placeholder="Enter name" maxlength="12">
        </div>
        <button id="start-game-btn" class="btn btn-primary">Start Game</button>
      </div>
    </div>

    <!-- Resume Modal -->
    <div id="resume-modal" class="modal hidden">
      <div class="modal-content">
        <h2>Resume Game?</h2>
        <p>A saved game was found.</p>
        <div class="modal-buttons">
          <button id="resume-btn" class="btn btn-primary">Resume</button>
          <button id="new-game-btn" class="btn btn-secondary">New Game</button>
        </div>
      </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen hidden">
      <!-- Menu Button (top corner) -->
      <button id="menu-btn" class="btn btn-menu">Menu</button>

      <!-- Dice Area -->
      <div id="dice-area">
        <div id="dice-container">
          <div class="dice-row white-dice">
            <div class="die white" id="die-white1" data-value="1"></div>
            <div class="die white" id="die-white2" data-value="1"></div>
          </div>
          <div class="dice-row colored-dice">
            <div class="die red" id="die-red" data-value="1"></div>
            <div class="die yellow" id="die-yellow" data-value="1"></div>
            <div class="die green" id="die-green" data-value="1"></div>
            <div class="die blue" id="die-blue" data-value="1"></div>
          </div>
        </div>
        <div id="dice-info">
          <span id="white-sum">White: --</span>
        </div>
        <button id="roll-btn" class="btn btn-roll">Roll Dice</button>
      </div>

      <!-- Current Player Sheet (single view) -->
      <div id="current-player-container">
        <div class="player-sheet" id="current-player-sheet">
          <div class="player-header">
            <span class="player-name">Player</span>
            <span class="player-status"></span>
            <span class="player-score">0</span>
          </div>
          <div class="score-rows">
            <div class="score-row red" data-color="red"></div>
            <div class="score-row yellow" data-color="yellow"></div>
            <div class="score-row green" data-color="green"></div>
            <div class="score-row blue" data-color="blue"></div>
          </div>
          <div class="penalties-row">
            <span class="penalties-label">Penalties:</span>
            <div class="penalty-boxes"></div>
          </div>
          <div class="player-actions">
            <button id="peek-btn" class="btn btn-peek">View Opponent</button>
            <button id="done-btn" class="btn btn-done">Done</button>
          </div>
        </div>
      </div>

    </div>

    <!-- Confirm New Game Modal -->
    <div id="confirm-modal" class="modal hidden">
      <div class="modal-content">
        <h2>Start New Game?</h2>
        <p>Your current game progress will be lost.</p>
        <div class="modal-buttons">
          <button id="confirm-new-btn" class="btn btn-primary">New Game</button>
          <button id="cancel-new-btn" class="btn btn-secondary">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Transition Screen -->
    <div id="transition-screen" class="screen hidden">
      <div class="transition-content">
        <h2 id="transition-message">Pass to Player</h2>
        <button id="ready-btn" class="btn btn-primary">Ready</button>
      </div>
    </div>

    <!-- Peek Modal -->
    <div id="peek-modal" class="modal hidden">
      <div class="modal-content peek-content">
        <h3 id="peek-player-name">Opponent's Board</h3>
        <div class="peek-sheet">
          <div class="score-rows" id="peek-score-rows">
            <div class="score-row red" data-color="red"></div>
            <div class="score-row yellow" data-color="yellow"></div>
            <div class="score-row green" data-color="green"></div>
            <div class="score-row blue" data-color="blue"></div>
          </div>
          <div class="penalties-row">
            <span class="penalties-label">Penalties:</span>
            <div class="penalty-boxes" id="peek-penalties"></div>
          </div>
          <div class="peek-score">Score: <span id="peek-score">0</span></div>
        </div>
        <button id="close-peek-btn" class="btn btn-secondary">Close</button>
      </div>
    </div>

    <!-- Slot Choice Modal -->
    <div id="choice-modal" class="modal hidden">
      <div class="modal-content choice-content">
        <h3>Which dice to use?</h3>
        <p id="choice-description">This number is available via both methods.</p>
        <div class="choice-buttons">
          <button id="choice-white-btn" class="btn choice-btn choice-white">
            <span class="choice-label">White Dice</span>
            <span class="choice-value" id="choice-white-value"></span>
          </button>
          <button id="choice-colored-btn" class="btn choice-btn choice-colored">
            <span class="choice-label">Colored Dice</span>
            <span class="choice-value" id="choice-colored-value"></span>
          </button>
        </div>
        <button id="choice-cancel-btn" class="btn btn-secondary">Cancel</button>
      </div>
    </div>

    <!-- Game Over Screen -->
    <div id="gameover-screen" class="screen hidden">
      <h1>Game Over</h1>
      <div id="final-scores"></div>
      <button id="play-again-btn" class="btn btn-primary">Play Again</button>
    </div>
  </div>

  <script src="js/game.js"></script>
  <script src="js/dice.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
